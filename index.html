<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

:root{
    --primary:#2563eb;
    --secondary:#0f172a;
    --bg:#f4f4f4;
    --card:#ffffff;
    --text:#333;
    --income:#16a34a;
    --expense:#dc2626;
}

body{
    background:var(--bg);
    color:var(--text);
}

.container{
    width:90%;
    max-width:800px;
    margin:30px auto;
}

h1{
    text-align:center;
    color:var(--primary);
    margin-bottom:20px;
}

.balance-card{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    margin-bottom:20px;
}

.balance-card h2{
    font-size:35px;
    margin-top:10px;
}

.summary{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.box{
    flex:1;
    background:var(--card);
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.box h3{
    margin-bottom:10px;
}

.income{
    color:var(--income);
}

.expense{
    color:var(--expense);
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
    margin-bottom:20px;
}

.card h2{
    color:var(--primary);
    margin-bottom:15px;
}

label{
    display:block;
    margin:10px 0 5px;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:5px;
    background:var(--primary);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
    background:#1d4ed8;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:var(--primary);
    color:white;
    padding:10px;
}

table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

table tr:hover{
    background:#eef4ff;
}

@media(max-width:768px){

.summary{
    flex-direction:column;
}

table{
    font-size:13px;
}

}
</style>

</head>
<body>

<div class="container">

<h1>💰 Expense Tracker</h1>

<div class="balance-card">
<p>Total Balance</p>
<h2 id="balance">₹0</h2>
</div>

<div class="summary">

<div class="box">
<h3>Total Income</h3>
<h2 class="income" id="income">₹0</h2>
</div>

<div class="box">
<h3>Total Expense</h3>
<h2 class="expense" id="expense">₹0</h2>
</div>

</div>

<div class="card">
<label>Date</label>
<input type="date" id="date">

<label>Search Transaction</label>
<input
type="text"
id="search"
placeholder="Search Transaction..."
onkeyup="searchTransaction()">

<label>Description</label>
<input type="text" id="desc" placeholder="Enter description">

<label>Amount</label>
<input type="number" id="amount" placeholder="Enter amount">

<label>Category</label>
<select id="category">
<option>Food</option>
<option>Transport</option>
<option>Shopping</option>
<option>Bills</option>
<option>Entertainment</option>
<option>Salary</option>
<option>Other</option>
</select>

<label>Type</label>
<select id="type">
<option>Income</option>
<option>Expense</option>
</select>

<button onclick="addTransaction()">Add Transaction</button>

</div>

<div class="card">

<h2>Transaction History</h2>

<table>

<thead>
<tr>
<th>Date</th>
<th>Description</th>
<th>Category</th>
<th>Type</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>

<tbody id="history">

</tbody>

</table>

</div>

</div>

<script src="expense.js"></script>

</body>
  </html>
